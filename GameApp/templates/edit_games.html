<!DOCTYPE html>
{% extends 'index.html' %}
{% block content %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form method = "post" action="{% url 'update_games' data.id %}" enctype="multipart/form-data">
  {% csrf_token %}
  <div class="col-md-12">
                  <div class="card mb-4">
                    <h5 class="card-header">Edit Game Details here...</h5>
                    <div class="card-body">
                      <div class="mb-3">
                        <label for="exampleFormControlSelect1" class="form-label">Game Category</label>
                        <select name="category" class="form-select" id="exampleFormControlSelect1" aria-label="">
                          <option>{{data.Game_Category}}</option>
                          {% for i in cat %}
                          <option>{{i.Category_Name}}</option>
                          {% endfor %}
                        </select>
                      </div>
                      <div class="mb-3">
                        <label for="formFileMultiple" class="form-label">Upload a Cover Photo :</label>
                        <img src="{{data.Cover_Image.url}}" style = "margin-left:30px" width="100px" height="100px">
                        <input style="margin-top:10px" name="c_img" class="form-control" type="file" id="formFileMultiple" multiple="">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Title of the game</label>
                        <input value="{{data.Game_Name}}" name="title" type="text" class="form-control" id="exampleFormControlInput" placeholder="Title of the game">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Tagline</label>
                        <input value="{{data.Tag_Line}}" name="name" type="text" class="form-control" id="exampleFormControlInput1" placeholder="Tagline for game">
                      </div>
                      <div class="mb-3">
                        <label  class="form-label">Short Description</label>
                        <textarea name="short" class="form-control" id="exampleFormControlTextarea" rows="3" placeholder="Short Description">{{data.Short_Description}}</textarea>
                      </div>
                      <div class="mb-3">
                        <label  class="form-label">Gameplay Summary</label>
                        <textarea name="summary" class="form-control" id="exampleFormControlTextarea12" rows="3" placeholder="Gameplay Summary">{{data.Summary}}</textarea>
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Genre</label>
                        <input value="{{data.Genre}}" name="genre" type="text" class="form-control" id="exampleFormControlInput13" placeholder="Genre">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Game Style</label>
                        <input value="{{data.Game_Style}}" name="style" type="text" class="form-control" id="exampleFormControlInput132" placeholder="Game Style">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Platform</label>
                        <input value="{{data.Platform}}" name="platform" type="text" class="form-control" id="exampleFormControlInput1321" placeholder="Platforms">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Release Date</label>
                        <input value="{{data.Release_Date}}" name="r_date" type="text" class="form-control" id="1" placeholder="Release Date">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Game Mode</label>
                        <input value="{{data.Game_Mode}}" name="mode" type="text" class="form-control" id="2" placeholder="Game Mode">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Developer</label>
                        <input value="{{data.Developer}}" name="devops" type="text" class="form-control" id="31" placeholder="Developer">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Publisher</label>
                        <input value="{{data.Publisher}}" name="publisher"  type="text" class="form-control" id="4" placeholder="Publisher">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Age Rating</label>
                        <input value="{{data.Age_Rating}}" name="age_rating" type="text" class="form-control" id="311" placeholder="Age Rating">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Average Playtime</label>
                        <input value="{{data.Play_Time}}" name="play" type="text" class="form-control" id="32" placeholder="Average Playtime">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Overall Rating</label>
                        <input value="{{data.Overall_Rating}}" name="overall" type="text" class="form-control" id="3" placeholder="Overall Rating">
                      </div>
                      <div class="mb-3">
                        <label for="exampleFormControlInput1" class="form-label">Download Link</label>
                        <input value="{{data.Download_Link}}" name="g_link" type="url" class="form-control" id="322" placeholder="Download Link">
                      </div>
                      <div class="mb-3">
                        <label for="formFileMultiple" class="form-label">Trailer :</label>
                        <video width="200px" height="200px" controls>
                           <source src="{{data.Trailer.url}}" type="video/mp4">
                        </video>
                        <input name="trailer" class="form-control" type="file" id="formFileMultiple12" multiple="">
                      </div>
                      <div class="mb-3">
                        <label for="formFileMultiple" class="form-label">Image1 :</label>
                        <img src="{{data.Image1.url}}" style = "margin-left:30px" width="100px" height="100px">
                        <input style="margin-top:10px" name="img1" class="form-control" type="file" id="formFileMultiple1" multiple="">
                      </div>
                      <div class="mb-3">
                        <label for="formFileMultiple" class="form-label">Image2 :</label>
                        <img src="{{data.Image2.url}}" style = "margin-left:30px" width="100px" height="100px">
                        <input style="margin-top:10px" name="img2" class="form-control" type="file" id="formFileMultiple2" multiple="">
                      </div>
                      <div class="mb-3">
                        <label for="formFileMultiple" class="form-label">Image3 :</label>
                        <img src="{{data.Image3.url}}" style = "margin-left:30px" width="100px" height="100px">
                        <input style="margin-top:10px" name="img3" class="form-control" type="file" id="formFileMultiple3" multiple="">
                      </div>
                      <div class="mb-3" >
                        <button type="submit" class="btn btn-success">Submit</button>
                      </div>
                    </div>
                  </div>
  </div>
</form>

</body>
</html>
{% endblock %}
