
<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/x-icon" href="{% static 'web/favicon/favicon.ico' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'web/favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'web/favicon/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'web/favicon/apple-touch-icon.png' %}">
    <title>Login</title>

    <!-- Font Icon -->
    <link rel="stylesheet" href="{% static 'log/fonts/material-icon/css/material-design-iconic-font.min.css' %}">

    <!-- Main css -->
    <link rel="stylesheet" href="{% static 'log/css/style.css' %}">
</head>
<body>

    <div class="main">

        <div class="container">
            <div class="signup-content">
                <form method="post" id="signup-form" class="signup-form" action="{% url 'login_user' %}" enctype="multipart/form-data">
                    {% csrf_token %}
                    <h2>Log In</h2>
                    <p class="desc"></p>
                    <div class="form-group">
                        <input type="text" class="form-input" name="name" id="name" placeholder="Your Name"/>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-input" name="password" id="password" placeholder="Password"/>
                        <span toggle="#password" class="zmdi zmdi-eye field-icon toggle-password"></span>
                    </div>
                    <div class="form-group">
                        <input type="checkbox" name="agree-term" id="agree-term" class="agree-term" />
                        <label for="agree-term" class="label-agree-term"><span><span></span></span>I agree all statements in  <a href="#" class="term-service">Terms of service</a></label>
                    </div>
                    <div class="form-group">
                        <input type="submit" name="submit" id="submit" class="form-submit submit" value="Login"/>
                        <a href="{% url 'login_page' %}" class="submit-link submit">Sign up</a>
                    </div>
                </form>
            </div>
        </div>

    </div>

    <!-- JS -->
    <script src="{% static 'log/vendor/jquery/jquery.min.js' %}"></script>
    <script src="{% static 'log/js/main.js' %}"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    {% if messages %}
        {% for i in messages %}
           {% if i.tags == 'success' %}
               <script>
                   swal('{{i}}','','success')
               </script>
           {% elif i.tags == 'error' %}
               <script>
                   swal('{{i}}','','error')
               </script>
           {% elif i.tags == 'warning' %}
               <script>
                   swal('{{i}}','','warning')
               </script>
           {% else %}
               <script>
                   swal('{{i}}','','info')
               </script>
           {% endif %}
        {% endfor %}
    {% endif %}
</body><!-- This templates was made by Colorlib (https://colorlib.com) -->
</html>
